<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap');
  .fg{
    --paper:oklch(0.97 0.015 85);--paper2:oklch(0.935 0.024 82);--paper3:oklch(0.90 0.032 80);
    --ink:oklch(0.24 0.02 60);--ink2:oklch(0.44 0.02 62);--ink3:oklch(0.60 0.018 64);
    --ball:oklch(0.86 0.18 128);--ballink:oklch(0.34 0.09 132);
    --coral:oklch(0.72 0.17 25);--sky:oklch(0.70 0.13 240);--gold:oklch(0.82 0.13 85);
    --line:oklch(0.85 0.022 72);
    font-family:'Hanken Grotesk',ui-sans-serif,system-ui,sans-serif;color:var(--ink);background:var(--paper);
  }
  .fg *{box-sizing:border-box;}
  .grain{position:absolute;inset:0;pointer-events:none;z-index:0;
    background-image:radial-gradient(oklch(0.24 0.02 60/0.06) 1px,transparent 1.4px);
    background-size:5px 5px;mix-blend-mode:multiply;}
  .display{font-family:'Baloo 2',ui-rounded,system-ui,sans-serif;font-weight:800;letter-spacing:-0.015em;line-height:0.9;}
  .kick{font-weight:700;text-transform:uppercase;letter-spacing:0.24em;font-size:0.62rem;color:var(--ink3);}
  .hl{background:var(--ball);padding:0 0.12em;border-radius:0.12em;box-decoration-break:clone;-webkit-box-decoration-break:clone;}
  .stamp{border:2.5px solid var(--coral);border-radius:0.55rem;color:var(--coral);font-weight:800;letter-spacing:0.08em;}
  .sticker{box-shadow:0 14px 30px -10px oklch(0.24 0.02 60/0.4);border:3px solid var(--paper);}
  .mode-landscape .sl-layout{flex-direction:row;}
  .mode-portrait .sl-layout{flex-direction:column;}
  .mode-landscape .sl-left{width:54%;}
  .mode-landscape .sl-right{width:46%;}
  .mode-portrait .sl-left{width:100%;flex:1;}
  .mode-portrait .sl-right{width:100%;height:40%;}
  .mode-portrait .sl-h{font-size:clamp(2.6rem,11vw,4rem);}
</style>

<section class="fg w-full h-full overflow-hidden relative">
  <div class="grain"></div>
  <div class="sl-layout flex h-full relative" style="z-index:1;">

    <!-- Left: field-guide cover plate -->
    <div class="sl-left flex flex-col justify-between" style="padding:clamp(2rem,4vw,3.5rem);">

      <!-- top register line -->
      <div class="flex items-center justify-between">
        <span class="kick">A Field Guide to Dogs</span>
        <span class="kick" style="color:var(--ink2);">Pl. 01 · Cover</span>
      </div>

      <!-- hero headline -->
      <div>
        <div class="flex items-center gap-2 mb-5">
          <span style="width:0.55rem;height:0.55rem;border-radius:999px;background:var(--coral);"></span>
          <span class="kick" style="color:var(--coral);">Dog-Spotting Companion</span>
        </div>
        <h1 class="display sl-h" style="font-size:clamp(3rem,6.4vw,5.6rem);color:var(--ink);">
          Gotta<br/>Pat 'Em<br/><span class="hl">All.</span>
        </h1>
        <p style="font-size:clamp(0.95rem,1.15vw,1.1rem);color:var(--ink2);line-height:1.55;max-width:30ch;margin-top:1.4rem;">
          Snap a dog, name the breed with AI, drop a pin, share the sighting. A Pokédex for dogs, built to share, in under thirty seconds.
        </p>
      </div>

      <!-- foot: tagline stamp + attribution -->
      <div class="flex items-end justify-between gap-4">
        <data-attribution />
        <span class="stamp" style="padding:0.4rem 0.7rem;transform:rotate(-3.5deg);font-size:0.6rem;white-space:nowrap;">Snap → Share</span>
      </div>
    </div>

    <!-- Right: hero specimen plate -->
    <div class="sl-right relative overflow-hidden" style="background:var(--paper3);">
      <img
        src="https://api.qb-deck.quantumbyte.ai/common/image-generation?prompt=person%20photographing%20a%20happy%20golden%20retriever%20on%20a%20sunny%20afternoon%20walk%20between%20two%20cafes%2C%20warm%20daylight%2C%20editorial%20lifestyle%20photography%2C%20joyful%20glanceable%20mood"
        alt="A dog lover capturing a golden retriever on a sunny walk"
        class="w-full h-full object-cover"
      />
      <!-- corner foil rarity tab -->
      <div class="sticker" style="position:absolute;top:1.3rem;right:1.3rem;background:linear-gradient(125deg,oklch(0.90 0.09 92),oklch(0.82 0.13 85) 42%,oklch(0.94 0.06 96) 54%,oklch(0.80 0.13 84));border-radius:999px;padding:0.4rem 0.85rem;transform:rotate(4deg);">
        <span style="font-size:0.6rem;font-weight:800;letter-spacing:0.06em;color:var(--ink);">★ LEGENDARY</span>
      </div>
      <!-- die-cut sighting card -->
      <div class="sticker" style="position:absolute;left:1.3rem;right:1.3rem;bottom:1.3rem;background:var(--paper);border-radius:1.1rem;padding:0.85rem;display:flex;align-items:center;gap:0.7rem;">
        <div style="width:2.5rem;height:2.5rem;border-radius:0.7rem;background:var(--ball);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;">🐕</div>
        <div style="flex:1;min-width:0;">
          <p class="display" style="font-size:1rem;color:var(--ink);">Golden Retriever</p>
          <p style="font-size:0.7rem;color:var(--ink3);margin-top:0.1rem;">
            <span style="color:var(--sky);font-weight:700;">📍 Riverside Park</span> · Sighting №47
          </p>
        </div>
        <span style="flex-shrink:0;background:var(--ink);color:var(--paper);font-size:0.65rem;font-weight:800;padding:0.4rem 0.7rem;border-radius:0.55rem;">Shared ✓</span>
      </div>
    </div>

  </div>
</section>
